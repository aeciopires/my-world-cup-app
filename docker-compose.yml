services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-world-cup-app:latest
    container_name: my-world-cup-app
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: 8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/server", "-healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
